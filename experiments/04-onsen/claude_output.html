<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>湯めぐり — 温泉旅館予約</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.phone-frame {
  width: 390px;
  height: 844px;
  background: #F8F5F0;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  box-shadow:
    0 0 0 2px #333,
    0 0 0 6px #1a1a1a,
    0 0 0 8px #333,
    0 40px 80px rgba(0,0,0,0.5);
}

/* Status Bar */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 28px 0;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10;
}

/* Hero */
.hero {
  height: 300px;
  position: relative;
  overflow: hidden;
}

.hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(
    180deg,
    rgba(0,0,0,0.3) 0%,
    rgba(0,0,0,0.05) 40%,
    rgba(0,0,0,0.4) 100%
  );
}

.hero-content {
  position: absolute;
  bottom: 24px;
  left: 24px;
  right: 24px;
  z-index: 2;
}

.hero-logo {
  font-family: 'Noto Serif JP', serif;
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
  letter-spacing: 4px;
}

.hero-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.85);
  font-weight: 300;
}

/* Content */
.content {
  height: calc(100% - 300px - 80px);
  overflow-y: auto;
  scrollbar-width: none;
}
.content::-webkit-scrollbar { display: none; }

/* Search */
.search-section {
  padding: 20px 24px 16px;
}

.search-bar {
  display: flex;
  align-items: center;
  background: #fff;
  border-radius: 14px;
  padding: 14px 18px;
  gap: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  font-size: 15px;
}

.search-bar input {
  background: none;
  border: none;
  outline: none;
  font-size: 15px;
  color: #333;
  flex: 1;
  font-family: inherit;
}

.search-bar input::placeholder {
  color: #bbb;
}

/* Quick Filters */
.quick-filters {
  display: flex;
  gap: 10px;
  padding: 0 24px 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.quick-filters::-webkit-scrollbar { display: none; }

.filter-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  background: #fff;
  color: #666;
  border: 1px solid #e8e4de;
}

.filter-chip.active {
  background: #8B6914;
  color: #fff;
  border-color: #8B6914;
}

/* Section */
.section {
  padding: 0 24px;
  margin-bottom: 20px;
}

.section-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 19px;
  font-weight: 600;
  color: #2d2418;
  margin-bottom: 14px;
}

/* Ryokan Cards */
.ryokan-card {
  background: #fff;
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.ryokan-img-wrap {
  height: 160px;
  position: relative;
  overflow: hidden;
}

.ryokan-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.ryokan-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(139,105,20,0.9);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 8px;
  letter-spacing: 0.5px;
}

.ryokan-rating {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(255,255,255,0.95);
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  color: #333;
}

.ryokan-rating .star {
  color: #D4A017;
}

.ryokan-info {
  padding: 16px 18px;
}

.ryokan-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 17px;
  font-weight: 600;
  color: #2d2418;
  margin-bottom: 6px;
}

.ryokan-location {
  font-size: 13px;
  color: #999;
  margin-bottom: 10px;
}

.ryokan-features {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.feature-tag {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 6px;
  background: #F5F0E6;
  color: #8B6914;
  font-weight: 500;
}

.ryokan-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.ryokan-price {
  font-size: 13px;
  color: #999;
}

.ryokan-price strong {
  font-size: 20px;
  font-weight: 700;
  color: #2d2418;
}

.ryokan-price small {
  font-size: 11px;
}

.reserve-btn {
  padding: 10px 24px;
  background: #8B6914;
  color: #fff;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-family: inherit;
  letter-spacing: 1px;
}

/* Bottom Nav */
.bottom-nav {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: #fff;
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
  padding-top: 10px;
  border-top: 1px solid #eee;
  z-index: 10;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  font-size: 11px;
  color: #bbb;
  cursor: pointer;
}

.nav-item.active {
  color: #8B6914;
}

.nav-icon {
  font-size: 24px;
}
</style>
</head>
<body>

<div class="phone-frame">
  <div class="status-bar">
    <span>14:22</span>
    <div>📶 🔋</div>
  </div>

  <!-- Hero with real photo -->
  <div class="hero">
    <img class="hero-img" src="https://images.unsplash.com/photo-1540541338287-41700207dee6?w=800&q=80" alt="温泉">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-logo">湯めぐり</div>
      <div class="hero-sub">心やすらぐ、とっておきの宿を見つけましょう</div>
    </div>
  </div>

  <div class="content">
    <!-- Search -->
    <div class="search-section">
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" placeholder="地名・旅館名で探す">
      </div>
    </div>

    <!-- Quick Filters -->
    <div class="quick-filters">
      <div class="filter-chip active">♨️ すべて</div>
      <div class="filter-chip">🏔️ 露天風呂</div>
      <div class="filter-chip">🍽️ 部屋食</div>
      <div class="filter-chip">🚗 送迎あり</div>
      <div class="filter-chip">♿ バリアフリー</div>
    </div>

    <!-- Recommended -->
    <div class="section">
      <div class="section-title">✨ おすすめの宿</div>

      <div class="ryokan-card">
        <div class="ryokan-img-wrap">
          <img class="ryokan-img" src="https://images.unsplash.com/photo-1580618432485-1e08c5039909?w=800&q=80" alt="旅館">
          <div class="ryokan-badge">人気No.1</div>
          <div class="ryokan-rating"><span class="star">★</span> 4.9</div>
        </div>
        <div class="ryokan-info">
          <div class="ryokan-name">石和温泉 花水庵</div>
          <div class="ryokan-location">📍 山梨県笛吹市石和町</div>
          <div class="ryokan-features">
            <span class="feature-tag">露天風呂</span>
            <span class="feature-tag">部屋食</span>
            <span class="feature-tag">送迎あり</span>
          </div>
          <div class="ryokan-bottom">
            <div class="ryokan-price"><strong>¥18,000</strong><small>〜/人（1泊2食）</small></div>
            <button class="reserve-btn">空室確認</button>
          </div>
        </div>
      </div>

      <div class="ryokan-card">
        <div class="ryokan-img-wrap">
          <img class="ryokan-img" src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=800&q=80" alt="旅館">
          <div class="ryokan-badge">クチコミ高評価</div>
          <div class="ryokan-rating"><span class="star">★</span> 4.8</div>
        </div>
        <div class="ryokan-info">
          <div class="ryokan-name">下部温泉 湯元館</div>
          <div class="ryokan-location">📍 山梨県南巨摩郡身延町</div>
          <div class="ryokan-features">
            <span class="feature-tag">源泉かけ流し</span>
            <span class="feature-tag">バリアフリー</span>
          </div>
          <div class="ryokan-bottom">
            <div class="ryokan-price"><strong>¥15,000</strong><small>〜/人（1泊2食）</small></div>
            <button class="reserve-btn">空室確認</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span>ホーム</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">🔍</span>
      <span>探す</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">📅</span>
      <span>予約一覧</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">❤️</span>
      <span>お気に入り</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">👤</span>
      <span>マイページ</span>
    </div>
  </div>
</div>

</body>
</html>
